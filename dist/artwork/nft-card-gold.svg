<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a25"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb"/>
      <stop offset="50%" style="stop-color:#9ca3af"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    
    <filter id="cardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect width="400" height="600" rx="20" fill="url(#cardBg)" stroke="url(#goldGradient)" stroke-width="4"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="360" height="560" rx="15" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.5"/>
  
  <!-- Header -->
  <rect x="40" y="40" width="320" height="60" rx="10" fill="rgba(99,102,241,0.1)" stroke="url(#goldGradient)" stroke-width="1"/>
  <text x="200" y="80" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="url(#goldGradient)">MEMORY ACCESS</text>
  
  <!-- Image area -->
  <rect x="60" y="120" width="280" height="200" rx="10" fill="#252538"/>
  
  <!-- Placeholder icon -->
  <g transform="translate(200, 220)" opacity="0.3">
    <polygon points="0,-40 34,-20 34,20 0,40 -34,20 -34,-20" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <circle r="20" fill="url(#goldGradient)" opacity="0.5"/>
  </g>
  
  <!-- Level badge -->
  <circle cx="320" cy="140" r="25" fill="url(#goldGradient)" filter="url(#cardGlow)"/>
  <text x="320" y="148" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#0a0a0f">LVL</text>
  
  <!-- Card details -->
  <rect x="40" y="340" width="320" height="200" rx="10" fill="rgba(99,102,241,0.05)"/>
  
  <text x="60" y="380" font-family="system-ui" font-size="18" font-weight="bold" fill="white">Access Credential</text>
  
  <text x="60" y="420" font-family="system-ui" font-size="14" fill="#9ca3af">Access Level:</text>
  <rect x="60" y="430" width="120" height="30" rx="15" fill="url(#goldGradient)"/>
  <text x="120" y="450" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0a0a0f">ADMIN</text>
  
  <text x="60" y="500" font-family="system-ui" font-size="14" fill="#9ca3af">Token ID:</text>
  <text x="60" y="520" font-family="system-ui" font-size="16" font-weight="600" fill="white" font-family="monospace">#0001</text>
  
  <!-- Footer -->
  <rect x="40" y="550" width="320" height="40" rx="5" fill="rgba(99,102,241,0.1)"/>
  <text x="200" y="575" text-anchor="middle" font-family="system-ui" font-size="12" fill="#6366f1">MemoryVault Pro • Base</text>
  
  <!-- Corner decorations -->
  <g opacity="0.3">
    <circle cx="30" cy="30" r="5" fill="url(#goldGradient)"/>
    <circle cx="370" cy="30" r="5" fill="url(#goldGradient)"/>
    <circle cx="30" cy="570" r="5" fill="url(#goldGradient)"/>
    <circle cx="370" cy="570" r="5" fill="url(#goldGradient)"/>
  </g>
</svg>
