<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/artwork/logo.svg" />
    <link rel="apple-touch-icon" href="/artwork/logo.svg" />
    
    <!-- Primary Meta Tags -->
    <title>MemoryVault Pro | Private AI Agent Memory on Blockchain</title>
    <meta name="title" content="MemoryVault Pro | Private AI Agent Memory on Blockchain" />
    <meta name="description" content="Secure, encrypted memory storage for AI agents with NFT-based access control. Store private agent memories permanently on Base blockchain with end-to-end encryption." />
    <meta name="keywords" content="AI memory, blockchain storage, NFT credentials, Base, Web3, decentralized storage, AI agents, encryption, privacy" />
    <meta name="author" content="MemoryVault Pro" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://memoryvault.vercel.app" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://memoryvault.vercel.app" />
    <meta property="og:title" content="MemoryVault Pro | Private AI Agent Memory on Blockchain" />
    <meta property="og:description" content="Secure, encrypted memory storage for AI agents with NFT-based access control." />
    <meta property="og:image" content="https://memoryvault.vercel.app/artwork/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://memoryvault.vercel.app" />
    <meta property="twitter:title" content="MemoryVault Pro | Private AI Agent Memory on Blockchain" />
    <meta property="twitter:description" content="Secure, encrypted memory storage for AI agents with NFT-based access control." />
    <meta property="twitter:image" content="https://memoryvault.vercel.app/artwork/og-image.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://sepolia.base.org">
    <link rel="preconnect" href="https://sepolia.basescan.org">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Analytics - Plausible (Privacy-friendly) -->
    <script defer data-domain="memoryvault.vercel.app" src="https://plausible.io/js/script.js"></script>
    
    <!-- Structured Data - JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MemoryVault Pro",
      "description": "Private AI Agent Memory on Blockchain - Secure, encrypted memory storage with NFT-based access control",
      "applicationCategory": "BlockchainApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "End-to-end encryption",
        "NFT-based access control",
        "Distributed memory sharding",
        "Permanent blockchain storage",
        "Soulbound credentials"
      ],
      "url": "https://memoryvault.vercel.app",
      "image": "https://memoryvault.vercel.app/artwork/logo.svg"
    }
    </script>
    
    <style>
      /* Critical CSS for above-the-fold content */
      body {
        margin: 0;
        background: #0a0a0f;
        color: #f8fafc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading state */
      .initial-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 1rem;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading state - replaced by React -->
      <div class="initial-loading">
        <div class="loading-spinner"></div>
        <p style="color: #64748b; font-size: 14px;">Loading MemoryVault...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
