<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1a25"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:0.4"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Neural network nodes -->
  <g opacity="0.6">
    <circle cx="200" cy="200" r="80" fill="url(#accentGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1720" cy="300" r="100" fill="url(#accentGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0.6;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="800" r="120" fill="url(#accentGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="700" r="60" fill="url(#accentGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.7;0.5;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="700" r="70" fill="url(#accentGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection lines -->
  <g stroke="url(#accentGradient)" stroke-width="2" opacity="0.3">
    <line x1="200" y1="200" x2="400" y2="700">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="1720" y1="300" x2="1500" y2="700">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="700" x2="960" y2="800">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="1500" y1="700" x2="960" y2="800">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="200" x2="1720" y2="300">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Data streams -->
  <g opacity="0.4">
    <rect x="100" y="500" width="200" height="4" fill="#6366f1" rx="2">
      <animate attributeName="x" values="100;1700;100" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="1700" y="600" width="150" height="4" fill="#06b6d4" rx="2">
      <animate attributeName="x" values="1700;100;1700" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="500" y="400" width="100" height="4" fill="#d946ef" rx="2">
      <animate attributeName="x" values="500;1400;500" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Central Vault -->
  <g transform="translate(960, 540)">
    <polygon points="0,-100 86,-50 86,50 0,100 -86,50 -86,-50" 
             fill="none" 
             stroke="url(#accentGradient)" 
             stroke-width="3"
             filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </polygon>
    <circle r="40" fill="url(#accentGradient)" opacity="0.8" filter="url(#glow)">
      <animate attributeName="r" values="40;45;40" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
